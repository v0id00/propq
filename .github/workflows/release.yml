name: release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpass
          MYSQL_USER: mvclocal
          MYSQL_PASSWORD: mvclocal
          MYSQL_DATABASE: propq_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -u root -prootpass"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./... -v -count=1
        env:
          PROPQ_TEST_DSN: "mvclocal:mvclocal@tcp(127.0.0.1:3306)/propq_test"

      - name: Build
        run: go build -ldflags="-X 'github.com/v0id00/propq/internal/app.version=$(git describe --tags --always --dirty 2>/dev/null || echo dev)'" -o build/propq ./cmd/propq/

      - name: Binary check
        run: ./build/propq --version

  release:
    name: Release
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os:
          - name: linux-amd64
            goos: linux
            goarch: amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
          - name: darwin-arm64
            goos: darwin
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build (${{ matrix.os.name }})
        run: |
          export GOOS=${{ matrix.os.goos }}
          export GOARCH=${{ matrix.os.goarch }}
          export VERSION=$(git describe --tags --always 2>/dev/null || echo dev)
          go build -ldflags="-X 'github.com/v0id00/propq/internal/app.version=${VERSION}'" \
            -o "dist/propq-${{ matrix.os.name }}" ./cmd/propq/

      - name: Checksum
        run: |
          cd dist
          sha256sum propq-${{ matrix.os.name }} >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: propq-${{ matrix.os.name }}
          path: dist/propq-${{ matrix.os.name }}

  publish:
    name: Publish Release
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist/ -type f -name "propq-*" -exec cp {} release-assets/ \;

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          cat > release-notes.md << EOF
          ## propq ${VERSION}

          Async SQL executor for MySQL/MariaDB.

          ### Installation

          \`\`\`bash
          go install github.com/v0id00/propq/cmd/propq@${VERSION}
          \`\`\`

          Or download the binary for your platform from the assets below.

          ### Changes

          See the [commit log](https://github.com/v0id00/propq/commits/${VERSION}) for details.
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: propq ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: false
